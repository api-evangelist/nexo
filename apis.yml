aid: nexo
name: Nexo
description: >-
  Nexo is a crypto-backed lending and earning platform offering a REST API for
  managing crypto credit lines, earning interest on digital assets, swapping
  assets, and portfolio management. The Nexo Pro API provides programmatic
  access to advanced trading (spot, futures, TWAP), account balances, order
  management, and trade history via REST and WebSocket interfaces. A separate
  Payment Gateway API enables merchants to accept crypto payments with
  webhook-based deposit notifications.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/nexo/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
