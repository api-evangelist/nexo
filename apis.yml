  - Lending
  - Earning
  - Trading
  - Payments
  - Digital Assets
  - DeFi
apis:
  - name: Nexo Pro Trading API
    description: >-
      REST and WebSocket API for advanced crypto trading on Nexo Pro. Supports
      spot trading, futures, TWAP orders, account balances, order placement,
      order cancellation, trade history, and futures position management.
      Authentication uses HMAC-SHA256 signatures with API key and secret pairs.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://pro.nexo.com/apiDocPro.html
    baseURL: https://pro.nexo.com/api/v1
    tags:
      - Crypto Trading
      - Spot
      - Futures
      - Orders
      - Portfolio
    properties:
      - type: Documentation
        url: https://pro.nexo.com/apiDocPro.html
      - type: OpenAPI
        url: https://pro.nexo.com/apiDocPro.html
  - name: Nexo Payment Gateway API
    description: >-
      REST API enabling merchants to accept cryptocurrency payments. Supports
      listing available assets, creating deposit addresses per transaction
      reference, and receiving webhook notifications (PG_DEPOSIT events) for
      incoming crypto deposits across Bitcoin, Ethereum, Polygon, and BNB Smart
      Chain networks.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://pg.nexo.com
    baseURL: https://pg.nexo.com/api/v1
    tags:
      - Payments
      - Crypto Payments
      - Merchants
      - Webhooks
    properties:
      - type: Documentation
        url: https://pg.nexo.com
